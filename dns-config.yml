# RxSoft DNS + Nginx Configuration
# Used by dns-update.sh to manage subdomains and nginx routes.
# Add environments as needed (staging, dev, etc.)

domain: ehealthwares.com
ddns_url: "https://dynamicdns.park-your-domain.com/update"

# Environment-specific settings
environments:
  prod:
    # How to get the EC2 IP:
    #   terraform - reads from terraform state
    #   file       - reads from .ec2-ip cache
    #   literal:X  - uses a static IP (e.g. "literal:52.212.92.160")
    ip_source: terraform

    # Server blocks generated by dns-update.sh
    server_blocks:
      # Frontend block: serves the React app + /api/* proxy routes
      frontend:
        server_names:
          - rxsoft
          - damorex
          - apm
          - conversation
        root: /usr/share/nginx/html
        # Path-based proxy routes (used by admin app internally)
        proxy_routes:
          - route: api/backend
            upstream: rxsoft-backend:8080/api/
          - route: api/identity
            upstream: rxsoft-identity:8092/
          - route: api/lis
            upstream: rxsoft-lis-backend:8091/
            variable: true
          - route: api/conversation
            upstream: rxsoft-conversation-engine:8090/
            variable: true
          - route: api/communication
            upstream: rxsoft-backend:8080/
          - route: api/coding
            upstream: healthcare-interop:3000/
            variable: true
          - route: api/healthcare-concepts
            upstream: rxsoft-healthcare-concepts:3011/
            variable: true

      # API block: clean paths (no /api/ prefix) for external tooling
      api:
        prefix: api
        server_names:
          - api
        proxy_routes:
          - route: backend
            upstream: rxsoft-backend:8080/api/
          - route: identity
            upstream: rxsoft-identity:8092/
          - route: lis
            upstream: rxsoft-lis-backend:8091/
            variable: true
          - route: conversation
            upstream: rxsoft-conversation-engine:8090/
            variable: true
          - route: communication
            upstream: rxsoft-backend:8080/
          - route: coding
            upstream: healthcare-interop:3000/
            variable: true
          - route: concepts
            upstream: rxsoft-healthcare-concepts:3011/
            variable: true
