# RxSoft DNS Configuration
# Used by dns-update.sh for DDNS updates and nginx config deployment.

domain: ehealthwares.com
ddns_url: "https://dynamicdns.park-your-domain.com/update"

environments:
  prod:
    ip_source: terraform
    subdomains:
      - "@"
      - www
      - rxsoft
      - damorex
      - apm
      - conversation
      - api
