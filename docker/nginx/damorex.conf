server {
    listen 80;
    server_name damorex.ehealthwares.com damorex.com;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    resolver 127.0.0.11 valid=30s;
    set $backend http://rxsoft-backend:8080;

    rewrite ^/$ /damorex break;
    location /api/identity/ { proxy_pass http://rxsoft-identity:8092/; include /etc/nginx/proxy_params.conf; }
    location /api/lis/ { proxy_pass http://rxsoft-lis-backend:8091/; include /etc/nginx/proxy_params.conf; }
    location /api/conversation/ { proxy_pass http://rxsoft-conversation-engine:8090/; include /etc/nginx/proxy_params.conf; }
    location /api/coding/ { proxy_pass http://healthcare-interop:3000/; include /etc/nginx/proxy_params.conf; }
    location /api/healthcare-concepts/ { proxy_pass http://rxsoft-healthcare-concepts:3011/; include /etc/nginx/proxy_params.conf; }
    location /api/ { proxy_pass $backend/api/; include /etc/nginx/proxy_params.conf; }
    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; }
}
