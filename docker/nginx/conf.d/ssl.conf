# SSL params for all server blocks
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5:!CAMELLIA;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

server {
    listen 443 ssl;
    http2 on;
    server_name rxsoft.ehealthwares.com app.ehealthwares.com apm.ehealthwares.com;

    ssl_certificate /etc/letsencrypt/live/ehealthwares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ehealthwares.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    location /api/identity/ { proxy_pass http://rxsoft-identity:8092/; include /etc/nginx/proxy_params.conf; }
    # location /api/lis/ { proxy_pass http://rxsoft-lis-backend:8091/; include /etc/nginx/proxy_params.conf; }
    location /api/conversation/ { proxy_pass http://rxsoft-conversation-engine:8090/api/; include /etc/nginx/proxy_params.conf; }
    # location /api/coding/ { proxy_pass http://healthcare-interop:3000/; include /etc/nginx/proxy_params.conf; }
    # location /api/healthcare-concepts/ { proxy_pass http://rxsoft-healthcare-concepts:3011/; include /etc/nginx/proxy_params.conf; }
    location /api/ { proxy_pass http://rxsoft-backend:8080/api/; include /etc/nginx/proxy_params.conf; }

    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.ehealthwares.com;

    ssl_certificate /etc/letsencrypt/live/ehealthwares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ehealthwares.com/privkey.pem;

    gzip on;
    gzip_types application/json;
    gzip_comp_level 6;

    location /identity/ { proxy_pass http://rxsoft-identity:8092/; include /etc/nginx/proxy_params.conf; }
    # location /lis/ { proxy_pass http://rxsoft-lis-backend:8091/; include /etc/nginx/proxy_params.conf; }
    location /conversation/ { proxy_pass http://rxsoft-conversation-engine:8090/api/; include /etc/nginx/proxy_params.conf; }
    # location /coding/ { proxy_pass http://healthcare-interop:3000/; include /etc/nginx/proxy_params.conf; }
    # location /healthcare-concepts/ { proxy_pass http://rxsoft-healthcare-concepts:3011/; include /etc/nginx/proxy_params.conf; }
    location / { proxy_pass http://rxsoft-backend:8080/api/; include /etc/nginx/proxy_params.conf; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.ehealthwares.com ehealthwares.com;

    ssl_certificate /etc/letsencrypt/live/ehealthwares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ehealthwares.com/privkey.pem;

    location / {
        proxy_pass http://rxsoft-ehealthwares:3000;
        include /etc/nginx/proxy_params.conf;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name conversation.ehealthwares.com;

    ssl_certificate /etc/letsencrypt/live/ehealthwares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ehealthwares.com/privkey.pem;

    location / {
        proxy_pass http://rxsoft-conversation-engine:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/proxy_params.conf;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name damorex.ehealthwares.com damorex.com;

    ssl_certificate /etc/letsencrypt/live/ehealthwares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ehealthwares.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    resolver 127.0.0.11 valid=30s;
    set $backend http://rxsoft-backend:8080;

    rewrite ^/$ /damorex break;
    location /api/identity/ { proxy_pass http://rxsoft-identity:8092/; include /etc/nginx/proxy_params.conf; }
    # location /api/lis/ { proxy_pass http://rxsoft-lis-backend:8091/; include /etc/nginx/proxy_params.conf; }
    location /api/conversation/ { proxy_pass http://rxsoft-conversation-engine:8090/api/; include /etc/nginx/proxy_params.conf; }
    # location /api/coding/ { proxy_pass http://healthcare-interop:3000/; include /etc/nginx/proxy_params.conf; }
    # location /api/healthcare-concepts/ { proxy_pass http://rxsoft-healthcare-concepts:3011/; include /etc/nginx/proxy_params.conf; }
    location /api/ { proxy_pass $backend$request_uri; include /etc/nginx/proxy_params.conf; }
    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; }
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/ehealthwares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ehealthwares.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; }
}
