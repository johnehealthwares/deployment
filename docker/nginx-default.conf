# Catch-all for direct IP access. Specific server_names are handled
# by the dynamically-deployed rxsoft.conf / api.conf / www.conf / websocket.conf.

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; }
}
